name: Build PWNGHOST-RS SD Card Image

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      target:
        description: 'Target board'
        required: true
        default: 'pi-zero-2w'
        type: choice
        options:
          - pi-zero-w
          - pi-zero-2w

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-C target-cpu=arm1176jzf-s -C link-arg=-fuse-ld=lld"

jobs:
  build-rust:
    name: Cross-compile Rust workspace
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - arm-unknown-linux-gnueabihf    # Pi Zero W (ARMv6)
          - armv7-unknown-linux-gnueabihf  # Pi Zero 2W (ARMv7)
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation dependencies
        run: |
          sudo dpkg --add-architecture armhf
          sudo apt-get update
          sudo apt-get install -y \
            gcc-arm-linux-gnueabihf \
            g++-arm-linux-gnueabihf \
            libc6-dev:armhf \
            libstdc++-12-dev:armhf \
            pkg-config \
            libssl-dev:armhf \
            libudev-dev:armhf \
            libsqlite3-dev:armhf \
            libclang-dev \
            llvm \
            lld

      - name: Setup cargo config for cross-compilation
        run: |
          mkdir -p .cargo
          cat > .cargo/config.toml << 'EOF'
          [target.arm-unknown-linux-gnueabihf]
          linker = "arm-linux-gnueabihf-gcc"
          rustflags = [
            "-C", "link-arg=-fuse-ld=lld",
            "-C", "target-cpu=arm1176jzf-s",
            "-C", "link-arg=-Wl,--as-needed"
          ]

          [target.armv7-unknown-linux-gnueabihf]
          linker = "arm-linux-gnueabihf-gcc"
          rustflags = [
            "-C", "link-arg=-fuse-ld=lld",
            "-C", "target-cpu=cortex-a53",
            "-C", "link-arg=-Wl,--as-needed"
          ]

          [build]
          target = "${{ matrix.target }}"
          EOF

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-${{ matrix.target }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build workspace
        run: |
          cargo build --release --target ${{ matrix.target }} --workspace
        env:
          PKG_CONFIG_ALLOW_CROSS: 1
          PKG_CONFIG_PATH: /usr/lib/arm-linux-gnueabihf/pkgconfig

      - name: Copy binaries to staging
        run: |
          mkdir -p artifacts/${{ matrix.target }}
          cp target/${{ matrix.target }}/release/pwnghost-rs artifacts/${{ matrix.target }}/
          # Copy any other binaries
          find target/${{ matrix.target }}/release -maxdepth 1 -type f -executable -name "pwn*" -exec cp {} artifacts/${{ matrix.target }}/ \;

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pwnghost-rs-${{ matrix.target }}
          path: artifacts/${{ matrix.target }}/
          retention-days: 7

  build-image:
    name: Build SD card image with pi-gen
    needs: build-rust
    runs-on: ubuntu-latest
    strategy:
      matrix:
        board: [pi-zero-w, pi-zero-2w]
    steps:
      - name: Checkout pi-gen
        uses: actions/checkout@v4
        with:
          repository: RPi-Distro/pi-gen
          path: pi-gen
          ref: '2024-11-19-raspios-bookworm-armhf'  # Bookworm release

      - name: Download Rust artifacts
        uses: actions/download-artifact@v4
        with:
          name: pwnghost-rs-arm-unknown-linux-gnueabihf
          path: artifacts/arm-unknown-linux-gnueabihf

      - name: Download Rust artifacts (ARMv7)
        uses: actions/download-artifact@v4
        with:
          name: pwnghost-rs-armv7-unknown-linux-gnueabihf
          path: artifacts/armv7-unknown-linux-gnueabihf

      - name: Prepare pi-gen config
        run: |
          cd pi-gen
          cat > config << 'EOF'
          IMG_NAME='pwnghost-rs'
          TARGET_HOSTNAME='pwnghost'
          FIRST_USER_NAME='pwn'
          FIRST_USER_PASS='pwnghost'
          ENABLE_SSH=1
          STAGE_LIST='stage2 stage3 stage4 stage5'
          DEPLOY_ZIP=1
          DEPLOY_COMPRESSION='xz'
          WPA_ESSID=''
          WPA_PASSWORD=''
          LOCALE_DEFAULT='en_US.UTF-8'
          KEYBOARD_KEYMAP='us'
          KEYBOARD_LAYOUT='English (US)'
          TIMEZONE_DEFAULT='UTC'
          EOF

      - name: Create custom stage4 (Rust artifacts)
        run: |
          cd pi-gen
          mkdir -p stage4/00-install-rust
          cat > stage4/00-install-rust/00-run.sh << 'EOF'
          #!/bin/bash -e
          
          # Install cross-compiled Rust binaries
          install -m 755 -o root -g root ${ROOTFS_DIR}/usr/local/bin/pwnghost-rs
          
          # Install systemd service
          install -m 644 -o root -g root ${ROOTFS_DIR}/etc/systemd/system/pwnghost-rs.service
          
          # Enable service
          systemctl enable pwnghost-rs
          EOF
          
          chmod +x stage4/00-install-rust/00-run.sh

      - name: Create systemd service
        run: |
          cd pi-gen
          mkdir -p stage4/00-install-rust/files/etc/systemd/system
          cat > stage4/00-install-rust/files/etc/systemd/system/pwnghost-rs.service << 'EOF'
          [Unit]
          Description=PWNGHOST-RS - Rust Pwnagotchi Implementation
          Documentation=https://github.com/pwnghost-rs/pwnghost-rs
          After=network.target
          Wants=network.target

          [Service]
          Type=notify
          ExecStart=/usr/local/bin/pwnghost-rs --config /etc/pwnghost/config.toml
          Restart=on-failure
          RestartSec=5
          StartLimitIntervalSec=60
          StartLimitBurst=3

          # Security hardening
          NoNewPrivileges=yes
          PrivateTmp=yes
          ProtectSystem=strict
          ProtectHome=yes
          ReadWritePaths=/etc/pwnghost /var/log/pwnghost /var/tmp/pwnghost /run/pwnghost
          CapabilityBoundingSet=CAP_NET_ADMIN CAP_NET_RAW CAP_SYS_ADMIN CAP_DAC_OVERRIDE CAP_SYS_RESOURCE
          AmbientCapabilities=CAP_NET_ADMIN CAP_NET_RAW

          # Resource limits
          LimitNOFILE=65536
          LimitNPROC=4096
          MemoryMax=50M
          CPUQuota=80%

          # Logging
          StandardOutput=journal
          StandardError=journal
          SyslogIdentifier=pwnghost-rs

          [Install]
          WantedBy=multi-user.target
          EOF

      - name: Create default config
        run: |
          cd pi-gen
          mkdir -p stage4/00-install-rust/files/etc/pwnghost/conf.d
          cat > stage4/00-install-rust/files/etc/pwnghost/config.toml << 'EOF'
          # PWNGHOST-RS Configuration for Raspberry Pi Zero W / Zero 2W
          # Waveshare V4 e-ink display (2.13" / 2.7" / 2.9")

          [main]
          name = "pwnghost"
          lang = "en"
          iface = "wlan0"
          mon_start_cmd = "/usr/bin/monstart"
          mon_stop_cmd = "/usr/bin/monstop"
          mon_max_blind_epochs = 5
          no_restart = false
          whitelist = []
          confd = "/etc/pwnghost/conf.d/"
          custom_plugin_repos = []
          custom_plugins = "/usr/local/share/pwnghost/custom-plugins/"

          [main.log]
          path = "/var/log/pwnghost/pwnghost.log"
          path_debug = "/var/log/pwnghost/pwnghost-debug.log"

          [main.log.rotation]
          enabled = true
          size = "10M"

          [personality]
          bored_num_epochs = 50
          sad_num_epochs = 100
          angry_num_epochs = 200
          lonely_num_epochs = 150
          bond_encounters_factor = 1.0
          max_interactions = 10
          throttle = 30
          reward_handshake = 100
          reward_new_ap = 10
          reward_association = 5
          penalty_missed = -10
          penalty_reboot = -50
          min_recon_time = 5
          max_recon_time = 30
          hop_recon_time = 10
          deauth = false
          associate = false
          min_rssi = -80

          [ui.web]
          enabled = true
          address = "0.0.0.0"
          auth = false
          username = "changeme"
          password = "changeme"
          origin = ""
          port = 8080
          on_frame = ""

          [ui.web.theme]
          accent_r = 76
          accent_g = 175
          accent_b = 80

          [ui.display]
          enabled = true
          rotation = 180
          display_type = "waveshare_v4"

          [ui.faces]
          png = false
          position_x = 0
          position_y = 16

          [bettercap]
          handshakes = "/etc/pwnghost/handshakes"
          silence = [
            "ble.device.new", "ble.device.lost",
            "wifi.client.new", "wifi.client.lost",
            "wifi.ap.new", "wifi.ap.lost",
            "mod.started"
          ]

          [fs]
          enabled = true

          [fs.mounts.log]
          enabled = true
          mount = "/var/log/pwnghost/"
          size = "50M"
          sync = 60
          zram = true
          rsync = true

          [fs.mounts.data]
          enabled = true
          mount = "/var/tmp/pwnghost"
          size = "10M"
          sync = 3600
          zram = true
          rsync = true

          [plugins.auto_tune]
          enabled = true

          [plugins.auto_backup]
          enabled = true

          [plugins.auto_update]
          enabled = true

          [plugins.grid]
          enabled = true

          [plugins.webcfg]
          enabled = true
          EOF

      - name: Create monitor mode scripts
        run: |
          cd pi-gen
          mkdir -p stage4/00-install-rust/files/usr/bin
          
          cat > stage4/00-install-rust/files/usr/bin/monstart << 'EOF'
          #!/bin/bash
          # Start monitor mode using nexmon
          
          INTERFACE="${1:-wlan0}"
          MON_INTERFACE="${INTERFACE}mon"
          
          # Bring down interface
          ip link set $INTERFACE down 2>/dev/null || true
          
          # Set monitor mode
          iw dev $INTERFACE set type monitor 2>/dev/null || {
              # Fallback to nexmon monstart
              /usr/local/bin/nexmon-buildtools/monstart $INTERFACE
          }
          
          # Bring up monitor interface
          ip link set $MON_INTERFACE up 2>/dev/null || true
          
          echo "Monitor mode started on $MON_INTERFACE"
          EOF
          
          cat > stage4/00-install-rust/files/usr/bin/monstop << 'EOF'
          #!/bin/bash
          # Stop monitor mode
          
          INTERFACE="${1:-wlan0}"
          MON_INTERFACE="${INTERFACE}mon"
          
          # Bring down monitor interface
          ip link set $MON_INTERFACE down 2>/dev/null || true
          
          # Set back to managed mode
          iw dev $MON_INTERFACE set type managed 2>/dev/null || {
              /usr/local/bin/nexmon-buildtools/monstop $INTERFACE
          }
          
          # Bring up managed interface
          ip link set $INTERFACE up 2>/dev/null || true
          
          echo "Monitor mode stopped, $INTERFACE back to managed"
          EOF
          
          chmod +x stage4/00-install-rust/files/usr/bin/monstart
          chmod +x stage4/00-install-rust/files/usr/bin/monstop

      - name: Create first-boot firmware patcher
        run: |
          cd pi-gen
          mkdir -p stage4/00-install-rust/files/usr/local/bin
          cat > stage4/00-install-rust/files/usr/local/bin/pwnghost-firstboot << 'EOF'
          #!/bin/bash
          # First boot firmware patcher for BCM43436B0 (Pi Zero 2W)
          
          set -e
          
          MARKER="/etc/pwnghost/.fw_patched"
          FIRMWARE_DIR="/lib/firmware/brcm"
          
          if [ -f "$MARKER" ]; then
              echo "Firmware already patched, skipping"
              exit 0
          fi
          
          echo "Detecting BCM chip..."
          
          # Detect chip from dmesg
          CHIP=$(dmesg | grep -i brcmfmac | grep -oE 'BCM434[0-9]{2}' | head -1 | sed 's/BCM//')
          
          if [ -z "$CHIP" ]; then
              # Try device tree
              if [ -f /proc/device-tree/model ]; then
                  MODEL=$(cat /proc/device-tree/model)
                  if echo "$MODEL" | grep -q "Zero 2"; then
                      CHIP="43436B0"
                  elif echo "$MODEL" | grep -q "Zero W"; then
                      CHIP="43430"
                  fi
              fi
          fi
          
          echo "Detected chip: $CHIP"
          
          if [ "$CHIP" = "43436B0" ]; then
              echo "Applying CoderFX 8-layer patches for BCM43436B0..."
              
              # Apply firmware patches using fw-patcher logic
              # This would call the embedded patcher or run the patch script
              /usr/local/bin/fw-patcher apply "$FIRMWARE_DIR" || {
                  echo "Firmware patching failed, but continuing..."
              }
              
              # Power cycle WL_REG_ON (GPIO 22 on Pi Zero 2W)
              echo "22" > /sys/class/gpio/export 2>/dev/null || true
              echo "out" > /sys/class/gpio/gpio22/direction 2>/dev/null || true
              echo "0" > /sys/class/gpio/gpio22/value 2>/dev/null || true
              sleep 0.1
              echo "1" > /sys/class/gpio/gpio22/value 2>/dev/null || true
              sleep 0.1
              
              # Install wlan_keepalive daemon
              systemctl enable wlan-keepalive 2>/dev/null || true
              systemctl start wlan-keepalive 2>/dev/null || true
          else
              echo "Chip $CHIP does not require CoderFX patches"
          fi
          
          # Write marker
          mkdir -p /etc/pwnghost
          echo "patched" > "$MARKER"
          
          echo "First boot setup complete"
          EOF
          
          chmod +x stage4/00-install-rust/files/usr/local/bin/pwnghost-firstboot

      - name: Create firstboot systemd service
        run: |
          cd pi-gen
          mkdir -p stage4/00-install-rust/files/etc/systemd/system
          cat > stage4/00-install-rust/files/etc/systemd/system/pwnghost-firstboot.service << 'EOF'
          [Unit]
          Description=PWNGHOST-RS First Boot Firmware Patcher
          Documentation=https://github.com/pwnghost-rs/pwnghost-rs
          After=local-fs.target
          Before=pwnghost-rs.service
          ConditionPathExists=!/etc/pwnghost/.fw_patched

          [Service]
          Type=oneshot
          ExecStart=/usr/local/bin/pwnghost-firstboot
          RemainAfterExit=yes
          StandardOutput=journal
          StandardError=journal

          [Install]
          WantedBy=multi-user.target
          EOF

      - name: Build image with pi-gen
        run: |
          cd pi-gen
          # Use the cross-compiled binaries
          # For Pi Zero W (ARMv6)
          if [ "${{ matrix.board }}" = "pi-zero-w" ]; then
            TARGET_ARCH=armhf
            TARGET_CPU=arm1176jzf-s
          else
            # Pi Zero 2W (ARMv7)
            TARGET_ARCH=armhf
            TARGET_CPU=cortex-a53
          fi
          
          # Build using docker (pi-gen requires root)
          docker run --rm --privileged \
            -v $(pwd):/pi-gen \
            -v $(pwd)/../artifacts:/artifacts \
            -e IMG_NAME=pwnghost-rs-${{ matrix.board }} \
            -e TARGET_HOSTNAME=pwnghost \
            -e STAGE_LIST="stage2 stage3 stage4 stage5" \
            debian:bookworm-slim \
            /bin/bash -c "
              apt-get update && apt-get install -y \
                binfmt-support btrfs-progs coreutils cpio dosfstools e2fsprogs \
                fdisk file gawk grep gzip kpartx libarchive-tools libcap2-bin \
                liblz4-tool openssl parted pigz policycoreutils python3 \
                python3-apt python3-distro python3-jinja2 python3-pexpect \
                python3-psutil python3-yaml qemu-user-static rsync sed sudo \
                systemd-container tar unzip util-linux wget xz-utils && \
              cd /pi-gen && ./build.sh
            "

      - name: Upload SD card image
        uses: actions/upload-artifact@v4
        with:
          name: pwnghost-rs-${{ matrix.board }}-img
          path: pi-gen/deploy/*.img.xz
          retention-days: 30

      - name: Create release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: pi-gen/deploy/*.img.xz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test-qemu:
    name: Test boot in QEMU
    needs: build-image
    runs-on: ubuntu-latest
    strategy:
      matrix:
        board: [pi-zero-w, pi-zero-2w]
    steps:
      - name: Download image
        uses: actions/download-artifact@v4
        with:
          name: pwnghost-rs-${{ matrix.board }}-img
          path: images

      - name: Test boot in QEMU
        run: |
          # Extract image
          xz -d images/*.img.xz
          IMG=$(ls images/*.img)
          
          # Quick boot test (30 second timeout)
          timeout 60 qemu-system-arm \
            -M raspi0 \
            -cpu arm1176 \
            -m 512 \
            -kernel kernel-qemu-4.19.50-buster \
            -dtb versatile-pb.dtb \
            -drive file=$IMG,format=raw \
            -append "root=/dev/sda2 panic=1 rootfstype=ext4 rw" \
            -nographic \
            -monitor none \
            -serial stdio || true
            
          echo "QEMU boot test completed (may have timed out as expected)"

  release:
    name: Create Release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: [build-image, test-qemu]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: pwnghost-rs-*-img
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          files: release-artifacts/*.img.xz
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}