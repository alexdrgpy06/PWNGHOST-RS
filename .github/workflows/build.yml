name: Build PWNGHOST-RS SD Card Image

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      target:
        description: 'Target board'
        required: true
        default: 'pi-zero-2w'
        type: choice
        options:
          - pi-zero-w
          - pi-zero-2w

env:
  CARGO_TERM_COLOR: always

jobs:
  cross-compile:
    name: Cross-compile Rust workspace
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - arm-unknown-linux-gnueabihf    # Pi Zero W (ARMv6)
          - armv7-unknown-linux-gnueabihf  # Pi Zero 2W (ARMv7)
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation dependencies
        run: |
          sudo dpkg --add-architecture armhf
          sudo apt-get update
          sudo apt-get install -y \
            gcc-arm-linux-gnueabihf \
            g++-arm-linux-gnueabihf \
            libc6-dev:armhf \
            libstdc++-12-dev:armhf \
            pkg-config \
            libssl-dev:armhf \
            libudev-dev:armhf \
            libsqlite3-dev:armhf \
            libclang-dev \
            llvm \
            lld

      - name: Setup cargo config for cross-compilation
        run: |
          mkdir -p .cargo
          cat > .cargo/config.toml << 'EOF'
          [target.arm-unknown-linux-gnueabihf]
          linker = "arm-linux-gnueabihf-gcc"
          rustflags = [
            "-C", "link-arg=-fuse-ld=lld",
            "-C", "target-cpu=arm1176jzf-s",
            "-C", "link-arg=-Wl,--as-needed"
          ]

          [target.armv7-unknown-linux-gnueabihf]
          linker = "arm-linux-gnueabihf-gcc"
          rustflags = [
            "-C", "link-arg=-fuse-ld=lld",
            "-C", "target-cpu=cortex-a53",
            "-C", "link-arg=-Wl,--as-needed"
          ]

          [build]
          target = "${{ matrix.target }}"
          EOF

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-${{ matrix.target }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build workspace
        run: |
          cargo build --release --target ${{ matrix.target }} --workspace
        env:
          PKG_CONFIG_ALLOW_CROSS: 1
          PKG_CONFIG_PATH: /usr/lib/arm-linux-gnueabihf/pkgconfig
        working-directory: PWNGHOST-RS

      - name: Copy binaries to staging
        run: |
          mkdir -p artifacts/${{ matrix.target }}
          cp target/${{ matrix.target }}/release/pwnghost-rs artifacts/${{ matrix.target }}/
          find target/${{ matrix.target }}/release -maxdepth 1 -type f -executable -name "pwn*" -exec cp {} artifacts/${{ matrix.target }}/ \;
        working-directory: PWNGHOST-RS

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pwnghost-rs-${{ matrix.target }}
          path: PWNGHOST-RS/artifacts/${{ matrix.target }}/
          retention-days: 7

  build-image:
    name: Build SD card image with pi-gen (Debian bookworm)
    needs: cross-compile
    runs-on: ubuntu-latest
    strategy:
      matrix:
        board: [pi-zero-w, pi-zero-2w]
    timeout-minutes: 90
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download Rust artifacts (ARMv6)
        uses: actions/download-artifact@v4
        with:
          name: pwnghost-rs-arm-unknown-linux-gnueabihf
          path: artifacts/arm-unknown-linux-gnueabihf

      - name: Download Rust artifacts (ARMv7)
        uses: actions/download-artifact@v4
        with:
          name: pwnghost-rs-armv7-unknown-linux-gnueabihf
          path: artifacts/armv7-unknown-linux-gnueabihf

      - name: Build Docker image with Debian bookworm
        run: |
          docker build -t pwnghost-rs-builder -f PWNGHOST-RS/Dockerfile.builder .

      - name: Build SD card image with pi-gen
        run: |
          mkdir -p artifacts
          docker run --rm --privileged \
            -v $(pwd)/pi-gen:/pi-gen \
            -v $(pwd)/artifacts:/artifacts \
            pwnghost-rs-builder \
            /bin/bash -c "
              cd /pi-gen
              IMG_NAME=pwnghost-rs-${{ matrix.board }}-$(date +%Y%m%d) ./build.sh
            "

      - name: Upload SD card image
        uses: actions/upload-artifact@v4
        with:
          name: pwnghost-rs-${{ matrix.board }}-img
          path: pi-gen/deploy/*.img.xz
          retention-days: 30

      - name: Create release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: pi-gen/deploy/*.img.xz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test-qemu:
    name: Test boot in QEMU
    needs: build-image
    runs-on: ubuntu-latest
    strategy:
      matrix:
        board: [pi-zero-w, pi-zero-2w]
    steps:
      - name: Download image
        uses: actions/download-artifact@v4
        with:
          name: pwnghost-rs-${{ matrix.board }}-img
          path: images

      - name: Test boot in QEMU
        run: |
          # Extract image
          xz -d images/*.img.xz
          IMG=$(ls images/*.img)
          
          # Quick boot test (30 second timeout)
          timeout 60 qemu-system-arm \
            -M raspi0 \
            -cpu arm1176 \
            -m 512 \
            -kernel kernel-qemu-4.19.50-buster \
            -dtb versatile-pb.dtb \
            -drive file=$IMG,format=raw \
            -append "root=/dev/sda2 panic=1 rootfstype=ext4 rw" \
            -nographic \
            -monitor none \
            -serial stdio || true
            
          echo "QEMU boot test completed (may have timed out as expected)"

  release:
    name: Create Release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: [build-image, test-qemu]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: pwnghost-rs-*-img
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*.img.xz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}