name: Build PWNGHOST-RS SD Card Image

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      target:
        description: 'Target board'
        required: true
        default: 'pi-zero-2w'
        type: choice
        options:
          - pi-zero-w
          - pi-zero-2w

env:
  CARGO_TERM_COLOR: always

jobs:
  build-image:
    name: Build SD card image with pi-gen (Debian bookworm)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        board: [pi-zero-w, pi-zero-2w]
    timeout-minutes: 90
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build Docker image with Debian bookworm
        run: |
          docker build -t pwnghost-rs-builder -f Dockerfile.builder .

      - name: Build SD card image with pi-gen
        run: |
          mkdir -p artifacts
          docker run --rm --privileged \
            -v $(pwd)/pi-gen:/pi-gen \
            -v $(pwd)/artifacts:/artifacts \
            pwnghost-rs-builder \
            /bin/bash -c "
              cd /pi-gen
              IMG_NAME=pwnghost-rs-${{ matrix.board }}-$(date +%Y%m%d) ./build.sh
            "

      - name: Upload SD card image
        uses: actions/upload-artifact@v4
        with:
          name: pwnghost-rs-${{ matrix.board }}-img
          path: pi-gen/deploy/*.img.xz
          retention-days: 30

      - name: Create release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: pi-gen/deploy/*.img.xz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test-qemu:
    name: Test boot in QEMU
    needs: build-image
    runs-on: ubuntu-latest
    strategy:
      matrix:
        board: [pi-zero-w, pi-zero-2w]
    steps:
      - name: Download image
        uses: actions/download-artifact@v4
        with:
          name: pwnghost-rs-${{ matrix.board }}-img
          path: images

      - name: Test boot in QEMU
        run: |
          # Extract image
          xz -d images/*.img.xz
          IMG=$(ls images/*.img)
          
          # Quick boot test (30 second timeout)
          timeout 60 qemu-system-arm \
            -M raspi0 \
            -cpu arm1176 \
            -m 512 \
            -kernel kernel-qemu-4.19.50-buster \
            -dtb versatile-pb.dtb \
            -drive file=$IMG,format=raw \
            -append "root=/dev/sda2 panic=1 rootfstype=ext4 rw" \
            -nographic \
            -monitor none \
            -serial stdio || true
            
          echo "QEMU boot test completed (may have timed out as expected)"

  release:
    name: Create Release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: [build-image, test-qemu]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: pwnghost-rs-*-img
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*.img.xz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}