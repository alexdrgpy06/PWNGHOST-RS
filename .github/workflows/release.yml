name: Release Build

on:
  push:
    tags: ['v*']

jobs:
  build-image:
    name: Build SD Card Image
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      matrix:
        board:
          - pi-zero-w
          - pi-zero-2w
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image for pi-gen
        run: |
          docker build -t pwnghost-rs-builder -f Dockerfile.builder .

      - name: Build SD card image
        run: |
          mkdir -p artifacts
          docker run --rm --privileged \
            -v $(pwd)/pi-gen:/pi-gen \
            -v $(pwd)/artifacts:/artifacts \
            pwnghost-rs-builder \
            /bin/bash -c "
              cd /pi-gen
              IMG_NAME=pwnghost-rs-${{ matrix.board }}-$(date +%Y%m%d) ./build.sh
            "

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: pwnghost-rs-${{ matrix.board }}-img
          path: artifacts/*.img.xz
          retention-days: 30

  release:
    name: Create GitHub Release
    needs: build-image
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: pwnghost-rs-*-img
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*.img.xz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}