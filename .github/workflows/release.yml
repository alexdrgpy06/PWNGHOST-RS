name: Release Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      board:
        description: 'Target board (leave blank to build both)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - pi-zero-w
          - pi-zero-2w

jobs:
  build-image:
    name: Build SD Card Image
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      matrix:
        board: [pi-zero-w, pi-zero-2w]
      fail-fast: false
    # NOTE: `matrix` isn't available in a job-level `if:` (matrix expansion
    # happens after job-level conditions are evaluated) -- this must be
    # repeated on every step instead.
    steps:
      - name: Checkout
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.board == '' || github.event.inputs.board == matrix.board }}
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.board == '' || github.event.inputs.board == matrix.board }}
        uses: docker/setup-buildx-action@v3

      # pi-gen's own dependencies_check requires binfmt_misc to be mounted
      # (needed for qemu-user-binfmt to run armhf binaries during the
      # debootstrap/chroot build) -- don't rely on the runner having it
      # preloaded, register it explicitly. Confirmed missing on at least
      # one local Docker environment even with --privileged.
      - name: Set up QEMU (binfmt_misc for armhf)
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.board == '' || github.event.inputs.board == matrix.board }}
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm

      # A real 50-minute CI run got all the way through the nexmon firmware
      # build (hundreds of qemu-emulated armhf gcc invocations inside the
      # chroot, all fine) and most of stage5, then failed on a later
      # `systemctl enable` inside the same chroot with "qemu-arm: Could not
      # open '/lib/ld-linux-armhf.so.3'". This exact error/context (qemu
      # emulation nested inside a chroot during a pi-gen-style build) is a
      # well-documented symptom of binfmt registration missing the
      # persistent "F" (fix binary) flag, which setup-qemu-action doesn't
      # guarantee if the runner already has some other qemu registration
      # present. Force a clean reset + persistent registration explicitly.
      - name: Reset QEMU binfmt registration with persistent (F) flag
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.board == '' || github.event.inputs.board == matrix.board }}
        run: docker run --rm --privileged multiarch/qemu-user-static --reset -p yes

      - name: Build Docker image for pi-gen
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.board == '' || github.event.inputs.board == matrix.board }}
        run: |
          docker build -t pwnghost-rs-builder -f Dockerfile.builder .

      - name: Build SD card image
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.board == '' || github.event.inputs.board == matrix.board }}
        run: |
          mkdir -p pi-gen/deploy
          docker run --rm --privileged \
            -e PWNGHOST_BOARD=${{ matrix.board }} \
            -e IMG_NAME=pwnghost-rs-${{ matrix.board }}-$(date +%Y%m%d) \
            -v $(pwd)/pi-gen/deploy:/workspace/pi-gen/deploy \
            pwnghost-rs-builder

      - name: Upload image artifact
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.board == '' || github.event.inputs.board == matrix.board }}
        uses: actions/upload-artifact@v4
        with:
          name: pwnghost-rs-${{ matrix.board }}-img
          path: pi-gen/deploy/*.img.xz
          retention-days: 30

  release:
    name: Create GitHub Release
    needs: build-image
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    # Without this, the default GITHUB_TOKEN is read-only on repos with a
    # restrictive default token permission setting, and
    # softprops/action-gh-release fails with "Resource not accessible by
    # integration" -- confirmed the hard way on the v0.1.3 tag-push trigger
    # (both board builds succeeded; only this step failed on permissions).
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: pwnghost-rs-*-img
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*.img.xz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
