name: Release Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      board:
        description: 'Target board (leave blank to build both)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - pi-zero-w
          - pi-zero-2w

jobs:
  build-image:
    name: Build SD Card Image
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      matrix:
        board: [pi-zero-w, pi-zero-2w]
      fail-fast: false
    # NOTE: `matrix` isn't available in a job-level `if:` (matrix expansion
    # happens after job-level conditions are evaluated) -- this must be
    # repeated on every step instead.
    steps:
      - name: Checkout
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.board == '' || github.event.inputs.board == matrix.board }}
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.board == '' || github.event.inputs.board == matrix.board }}
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image for pi-gen
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.board == '' || github.event.inputs.board == matrix.board }}
        run: |
          docker build -t pwnghost-rs-builder -f Dockerfile.builder .

      - name: Build SD card image
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.board == '' || github.event.inputs.board == matrix.board }}
        run: |
          mkdir -p pi-gen/deploy
          docker run --rm --privileged \
            -e PWNGHOST_BOARD=${{ matrix.board }} \
            -e IMG_NAME=pwnghost-rs-${{ matrix.board }}-$(date +%Y%m%d) \
            -v $(pwd)/pi-gen/deploy:/workspace/pi-gen/deploy \
            pwnghost-rs-builder

      - name: Upload image artifact
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.board == '' || github.event.inputs.board == matrix.board }}
        uses: actions/upload-artifact@v4
        with:
          name: pwnghost-rs-${{ matrix.board }}-img
          path: pi-gen/deploy/*.img.xz
          retention-days: 30

  release:
    name: Create GitHub Release
    needs: build-image
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: pwnghost-rs-*-img
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*.img.xz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
