# USB RNDIS Gadget Options for Windows 10/11 Auto-Detection
# idVendor=0x1d6b (Linux Foundation) + idProduct=0x0104 (Multifunction Composite)
# maps to Microsoft built-in RNDIS driver (rndismp6.sys) out of the box.
options g_ether idVendor=0x1d6b idProduct=0x0104 iManufacturer="Raspberry Pi" iProduct="Pwnagotchi RNDIS Gadget"
