# PWNGHOST-RS Default Configuration -- REFERENCE ONLY, NOT LOADED AT RUNTIME.
#
# Despite the filename, this file is never parsed or embedded anywhere:
# `config::load_config` builds its baseline from `Serialized::defaults(
# PwnConfig::default())` -- i.e. schema.rs's per-field `Default` impls are
# the real source of truth. Keep this file in sync with schema.rs by hand
# as a human-readable "what ships out of the box, all in one place"
# reference (mirroring real pwnagotchi's own `defaults.toml`, which IS
# functionally loaded there -- ours isn't, a divergence discovered
# 2026-07-20 when `[plugins.*].enabled` here disagreed with schema.rs's
# `default_plugins()`, which had drifted to enabling every plugin
# unconditionally; fixed in schema.rs, not here).

[main]
name = "pwnghost"
lang = "en"
iface = "wlan0mon"
mon_start_cmd = "/usr/bin/monstart"
mon_stop_cmd = "/usr/bin/monstop"
mon_max_blind_epochs = 50
no_restart = false
whitelist = []
confd = "/etc/pwnghost/conf.d/"
custom_plugin_repos = []
custom_plugins = "/usr/local/share/pwnghost/custom-plugins/"

[main.log]
path = "/etc/pwnghost/log/pwnghost.log"
path_debug = "/etc/pwnghost/log/pwnghost-debug.log"

[main.log.rotation]
enabled = true
size = "10M"

[personality]
# Mood thresholds match real pwnagotchi's defaults.toml (bored_num_epochs=15,
# sad_num_epochs=25, bond_encounters_factor=20000, max_interactions=3). The
# previous values (50/100/1.0/10) made the device take 3-4x longer to change
# mood -- and bond_encounters_factor=1.0 meant a single mesh peer instantly
# flipped every negative mood to "grateful", skipping bored/sad/lonely entirely.
bored_num_epochs = 15
sad_num_epochs = 25
angry_num_epochs = 200
lonely_num_epochs = 150
bond_encounters_factor = 20000
max_interactions = 3
throttle = 30
reward_handshake = 100
reward_new_ap = 10
reward_association = 5
penalty_missed = -10
penalty_reboot = -50
min_recon_time = 5
max_recon_time = 30
hop_recon_time = 10
# Active deauthentication of discovered APs to force clients to
# re-handshake -- this is real pwnagotchi's core "pwning" behavior and its
# own default. With this off, the agent runs purely passive and captures
# far fewer handshakes. When on, the agent issues deauth/assoc against
# targeted APs (via the bettercap capture backend) to provoke handshakes.
deauth = true
associate = true
min_rssi = -200
position_x = 0
position_y = 34
frame_padding = true
frame_padding_min_bytes = 650

[ui.web]
enabled = true
address = "0.0.0.0"
auth = false
username = "changeme"
password = "changeme"
origin = ""
port = 8080
on_frame = ""

[ui.web.theme]
accent_r = 76
accent_g = 175
accent_b = 80

[ui.display]
enabled = true
rotation = 180
display_type = "waveshare_v4"

[ui.faces]
png = true
position_x = 0
position_y = 34

[bettercap]
handshakes = "/etc/pwnghost/handshakes"
silence = [
    "ble.device.new",
    "ble.device.lost",
    "ble.device.service.discovered",
    "ble.device.characteristic.discovered",
    "ble.device.disconnected",
    "ble.device.connected",
    "ble.connection.timeout",
    "wifi.client.new",
    "wifi.client.lost",
    "wifi.client.probe",
    "wifi.ap.new",
    "wifi.ap.lost",
    "mod.started",
]

[fs]
enabled = true

[fs.mounts.log]
enabled = true
mount = "/etc/pwnghost/log/"
size = "50M"
sync = 60
zram = true
rsync = true

[fs.mounts.data]
enabled = true
mount = "/var/tmp/pwnghost"
size = "10M"
sync = 3600
zram = true
rsync = true

[plugins.auto_tune]
enabled = true

[plugins.auto_backup]
enabled = true

[plugins.auto_update]
enabled = true

[plugins.bt_tether]
enabled = false

[plugins.cache]
enabled = true

[plugins.fix_services]
enabled = true

# Off by default -- requires a physical button (e.g. the PiSugar S battery
# module's button). BCM GPIO3 is shared with I2C1 SCL: PiSugar's own docs
# require the board's "auto power-on" switch be set OFF before enabling
# this, or the pin gets held low for wake-on-power and corrupts any real
# I2C1 traffic. This is a physical switch on the board, not fixable in
# software. Long-press (held >= long_press_secs) triggers a safe shutdown;
# short-press is detected/logged only, no action bound.
[plugins.gpio_buttons]
enabled = false
pin = 3
long_press_secs = 3

[plugins.gps]
enabled = false

[plugins.grid]
enabled = true

[plugins.logtail]
enabled = false

[plugins.memtemp]
enabled = false

[plugins.ohcapi]
enabled = false

[plugins.pisugarx]
enabled = false

[plugins.pwncrack]
enabled = false

[plugins.session_stats]
enabled = false

[plugins.ups_lite]
enabled = false

[plugins.webcfg]
enabled = true

[plugins.pwnstore_ui]
enabled = true

[plugins.webgpsmap]
enabled = false

[plugins.wigle]
enabled = false

[plugins.wpa_sec]
enabled = false
