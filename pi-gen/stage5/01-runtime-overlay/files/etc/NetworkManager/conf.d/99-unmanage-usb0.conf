# usb0 is configured by usb-net.service (static 10.0.0.2 + dnsmasq) once the
# g_ether kernel module (loaded via cmdline.txt modules-load=dwc2,g_ether)
# creates the interface. Keep NetworkManager from touching it so the two
# don't fight over the address.
[keyfile]
unmanaged-devices=interface-name:usb0
